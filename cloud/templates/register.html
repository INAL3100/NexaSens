<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Sens — Créer un compte</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-logo">⬡ Nexa Sens</div>
        <p class="auth-subtitle">Créer votre compte</p>
        {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
        <form method="POST" class="auth-form">
            <input type="text" name="username" placeholder="Nom d'utilisateur" required>
            <input type="text" name="phone" placeholder="Numéro de téléphone" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <input type="text" name="pin" placeholder="PIN NSR-BOX (4 caractères)" maxlength="4" required style="text-transform:uppercase">
            <button type="submit">Créer le compte</button>
        </form>
        <a href="/login" class="auth-link">Déjà un compte ? Se connecter</a>
    </div>
</div>
</body>
</html>
